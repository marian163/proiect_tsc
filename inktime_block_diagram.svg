<svg width="680" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="620" fill="white"/>

  <!-- MCU central -->
  <rect x="250" y="240" width="180" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="264" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">nRF52840</text>
  <text x="340" y="282" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">MCU + BLE + USB</text>

  <!-- USB-C -->
  <rect x="20" y="40" width="120" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="80" y="60" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">USB-C</text>
  <text x="80" y="75" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">5V input + D+/D-</text>

  <!-- ESD -->
  <rect x="20" y="108" width="120" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="80" y="128" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">ESD Protection</text>
  <text x="80" y="143" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">USBLC6-2SC6Y</text>

  <!-- Charger -->
  <rect x="20" y="176" width="120" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="80" y="196" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">LiPo Charger</text>
  <text x="80" y="211" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">BQ25180</text>

  <!-- Battery -->
  <rect x="20" y="244" width="120" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="80" y="264" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">LiPo 250mAh</text>
  <text x="80" y="279" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">VBAT rail</text>

  <!-- Fuel Gauge -->
  <rect x="20" y="312" width="120" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="80" y="332" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Fuel Gauge</text>
  <text x="80" y="347" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">MAX17048</text>

  <!-- DC/DC -->
  <rect x="20" y="380" width="120" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="80" y="400" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">DC/DC 3V3</text>
  <text x="80" y="415" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">RT6160</text>

  <!-- E-Paper Display -->
  <rect x="250" y="40" width="180" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="64" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">E-Paper Display</text>
  <text x="340" y="82" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">1.54" 200x200 SPI</text>

  <!-- EPD Power Gate -->
  <rect x="250" y="128" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="148" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">EPD Power Gate</text>
  <text x="340" y="163" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">SI2308 PFET</text>

  <!-- IMU -->
  <rect x="490" y="40" width="160" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="570" y="60" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">IMU / Pedometru</text>
  <text x="570" y="75" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">BMA421 — I2C</text>

  <!-- Haptic Driver -->
  <rect x="490" y="108" width="160" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="570" y="128" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Haptic Driver</text>
  <text x="570" y="143" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">DRV2605 + motor</text>

  <!-- Butoane -->
  <rect x="490" y="176" width="160" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="570" y="196" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Butoane (3x)</text>
  <text x="570" y="211" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Up / Down / Enter</text>

  <!-- SWD Debug -->
  <rect x="490" y="244" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="570" y="264" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">SWD Debug</text>
  <text x="570" y="279" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">TC2030 connector</text>

  <!-- BLE -->
  <rect x="490" y="312" width="160" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="570" y="332" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">BLE 5.0</text>
  <text x="570" y="347" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Antena 2.4GHz</text>

  <!-- I2C bus -->
  <rect x="250" y="448" width="180" height="36" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="470" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#444441">I2C bus (P0.06/P0.07)</text>

  <!-- 3V3 rail -->
  <rect x="250" y="510" width="180" height="36" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="532" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#633806">3.3V rail</text>

  <!-- Arrows power chain -->
  <line x1="80" y1="84" x2="80" y2="106" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="80" y1="152" x2="80" y2="174" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="80" y1="220" x2="80" y2="242" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="80" y1="288" x2="80" y2="310" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- USB-C -> MCU -->
  <line x1="140" y1="62" x2="248" y2="268" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Charger -> MCU -->
  <line x1="140" y1="198" x2="248" y2="262" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Fuel -> MCU -->
  <line x1="140" y1="334" x2="248" y2="270" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- DC/DC -> MCU -->
  <line x1="140" y1="402" x2="248" y2="275" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MCU -> EPD Power Gate -->
  <line x1="340" y1="240" x2="340" y2="174" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- EPD Power Gate -> E-Paper -->
  <line x1="340" y1="128" x2="340" y2="102" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MCU -> IMU -->
  <line x1="430" y1="250" x2="488" y2="62" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- MCU -> Haptic -->
  <line x1="430" y1="255" x2="488" y2="130" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- MCU -> Butoane -->
  <line x1="430" y1="262" x2="488" y2="198" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- MCU -> SWD -->
  <line x1="430" y1="268" x2="488" y2="266" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- MCU -> BLE -->
  <line x1="430" y1="275" x2="488" y2="334" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MCU -> I2C bus -->
  <line x1="340" y1="300" x2="340" y2="446" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- I2C bus -> 3V3 -->
  <line x1="340" y1="484" x2="340" y2="508" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SPI label -->
  <text x="220" y="185" text-anchor="middle" font-size="11" fill="#0F6E56">SPI</text>
  <text x="220" y="197" text-anchor="middle" font-size="11" fill="#0F6E56">P0.02-P0.17</text>

  <!-- I2C label -->
  <text x="458" y="130" text-anchor="middle" font-size="11" fill="#993C1D">I2C</text>

  <!-- Legend -->
  <rect x="20" y="510" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="38" y="521" font-size="11" fill="#5F5E5A">Power</text>
  <rect x="90" y="510" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="108" y="521" font-size="11" fill="#5F5E5A">Display</text>
  <rect x="163" y="510" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="181" y="521" font-size="11" fill="#5F5E5A">Periferice</text>
  <rect x="20" y="535" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="38" y="546" font-size="11" fill="#5F5E5A">MCU / BLE</text>
  <rect x="110" y="535" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="128" y="546" font-size="11" fill="#5F5E5A">Debug / Bus</text>

  <!-- Title -->
  <text x="340" y="590" text-anchor="middle" font-size="13" font-weight="500" fill="#5F5E5A">InkTime — Diagrama Bloc Hardware v6</text>
</svg>
